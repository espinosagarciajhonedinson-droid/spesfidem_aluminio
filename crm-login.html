<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Login | Spesfidem</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#020617;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;padding:1rem;
      background-image:radial-gradient(ellipse at 20% 50%, rgba(56,189,248,0.06) 0%,transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(139,92,246,0.05) 0%,transparent 60%);}
    .card{background:rgba(15,23,42,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:2rem;padding:3rem 2.5rem;
      width:100%;max-width:440px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.6);}
    .shield{width:72px;height:72px;border-radius:50%;background:rgba(56,189,248,0.1);border:2px solid rgba(56,189,248,0.3);
      display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;}
    .shield i{color:#38bdf8;font-size:2rem;}
    h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.8rem;color:white;margin-bottom:.4rem;}
    p{color:#64748b;font-size:.9rem;margin-bottom:2rem;}
    .field{position:relative;margin-bottom:1rem}
    .field i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#475569;}
    input{width:100%;padding:.85rem .85rem .85rem 40px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;color:white;font-size:1rem;outline:none;transition:all .3s;}
    input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,0.2);}
    input::placeholder{color:#475569;}
    .btn{width:100%;padding:1rem;background:linear-gradient(135deg,#0369a1,#38bdf8);border:none;border-radius:12px;
      color:#0f172a;font-weight:800;font-size:1.05rem;cursor:pointer;transition:all .3s;margin-top:.5rem;
      display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(56,189,248,0.4);}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .error{color:#f87171;font-size:.85rem;margin-top:.8rem;padding:.6rem;background:rgba(239,68,68,.1);border-radius:8px;display:none;}
    .back{display:block;margin-top:1.5rem;color:#475569;text-decoration:none;font-size:.85rem;transition:color .3s;}
    .back:hover{color:#94a3b8;}
    .mode-badge{font-size:.72rem;color:#475569;margin-top:1rem;padding:.4rem .8rem;background:rgba(255,255,255,.04);border-radius:50px;display:inline-block;}
  </style>
</head>
<body>
  <div class="card">
    <div class="shield"><i class="fas fa-shield-alt"></i></div>
    <h1>CRM Spesfidem</h1>
    <p>Acceso al sistema de gestión de clientes y cotizaciones</p>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Correo electrónico" required autocomplete="username"></div>
      <div class="field">
        <i class="fas fa-lock"></i>
        <input type="password" id="pass" placeholder="Contraseña" required autocomplete="current-password" style="padding-right: 40px;">
        <i class="fas fa-eye" id="togglePassword" style="left: auto; right: 14px; cursor: pointer; transition: color 0.3s;" title="Mostrar/Ocultar contraseña"></i>
      </div>
      <button class="btn" type="submit" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Ingresar al CRM</button>
      <div class="error" id="errMsg"></div>
    </form>
    <a href="admin.html" class="back"><i class="fas fa-arrow-left"></i> Volver al Panel Admin</a>
    <div class="mode-badge" id="modeBadge">Verificando conexión...</div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/crm-auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Setup Firebase
      if (window.SpesFirebase) {
        await window.SpesFirebase.initFirebase();
        const badge = document.getElementById('modeBadge');
        badge.textContent = window.SpesFirebase.isFirebaseReady() ? '🔥 Firebase Conectado' : '💾 Modo Local (sin Firebase)';
      }

      // Toggle Password Logic
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('pass');

      togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
        this.classList.toggle('fa-eye');
        this.style.color = type === 'text' ? '#38bdf8' : '#475569';
      });
    });

    window.doLogin = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
      err.style.display = 'none';

      const result = await window.CrmAuth.login(
        document.getElementById('email').value,
        document.getElementById('pass').value
      );

      if (result.success) {
        window.location.href = 'crm.html';
      } else {
        err.textContent = result.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar al CRM';
      }
    };
  </script>
</body>
</html>
